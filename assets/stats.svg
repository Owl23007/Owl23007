<svg width="495" height="195" viewBox="0 0 495 195" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GitHub stats">
  <defs>
    <style>
      .header { fill: #102033; font-size: 18px; font-weight: 700; font-family: 'Segoe UI', Ubuntu, Arial, sans-serif; }
      .label { fill: #5f7185; font-size: 13px; font-family: 'Segoe UI', Ubuntu, Arial, sans-serif; }
      .value { fill: #102033; font-size: 18px; font-weight: 760; font-family: 'Segoe UI', Ubuntu, Arial, sans-serif; }
      .foot { fill: #7b8da0; font-size: 10px; font-family: 'Segoe UI', Ubuntu, Arial, sans-serif; }
    </style>
  </defs>

  <rect x="1" y="1" width="493" height="193" rx="10" fill="#ffffff" stroke="#dbe8f6" stroke-width="2"/>
  <rect x="18" y="17" width="459" height="42" rx="8" fill="#f3f8ff"/>
  <text x="247.5" y="44" class="header" text-anchor="middle">GitHub Stats</text>

  <g transform="translate(30, 88)">
    <text class="label">Repositories</text>
    <text y="24" class="value">20</text>
  </g>
  <g transform="translate(180, 88)">
    <text class="label">Stars</text>
    <text y="24" class="value">15</text>
  </g>
  <g transform="translate(315, 88)">
    <text class="label">Recent Commits</text>
    <text y="24" class="value">0</text>
  </g>

  <g transform="translate(30, 146)">
    <text class="label">Followers</text>
    <text x="92" class="value">4</text>
  </g>
  <g transform="translate(220, 146)">
    <text class="label">Following</text>
    <text x="92" class="value">6</text>
  </g>

  <text x="472" y="178" class="foot" text-anchor="end">Updated 2026-04-29</text>
</svg>