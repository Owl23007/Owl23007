<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="synapse-android repository card">
  <defs>
    <style>
      .repo-name { fill: #102033; font-size: 16px; font-weight: 700; font-family: 'Segoe UI', Ubuntu, Arial, sans-serif; }
      .repo-desc { fill: #5f7185; font-size: 12px; font-family: 'Segoe UI', Ubuntu, Arial, sans-serif; }
      .repo-stat { fill: #36536f; font-size: 12px; font-family: 'Segoe UI', Ubuntu, Arial, sans-serif; }
      .star-icon { fill: #f2994a; }
      .commit-icon { fill: none; stroke: #2f80ed; stroke-width: 1.8; stroke-linecap: round; }
    </style>
  </defs>

  <rect x="1" y="1" width="398" height="118" rx="10" fill="#ffffff" stroke="#dbe8f6" stroke-width="2"/>
  <rect x="14" y="14" width="372" height="34" rx="8" fill="#f8fbff"/>
  <text x="26" y="36" class="repo-name">synapse-android</text>
